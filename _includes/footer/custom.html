<!-- Copy button for code blocks -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('div.highlighter-rouge, figure.highlight').forEach(function(block) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.setAttribute('aria-label', 'Copy code');
    btn.textContent = ' Copy';
    btn.addEventListener('click', function() {
      var code = block.querySelector('code');
      if (!code) { return; }
      var text = code.textContent || code.innerText;
      navigator.clipboard.writeText(text).then(function() {
        btn.classList.add('copied');
        btn.textContent = ' Copied!';
        setTimeout(function() {
          btn.classList.remove('copied');
          btn.textContent = ' Copy';
        }, 2000);
      });
    });
    block.style.position = 'relative';
    block.appendChild(btn);
  });
});
</script>

<!-- Generate TOC from headings -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var tocSidebar = document.getElementById('toc-sidebar');
  var tocList = document.getElementById('toc-list');
  var tocTitle = document.getElementById('toc-title');
  if (!tocSidebar || !tocList) { return; }

  var content = document.querySelector('.content-with-toc');
  if (!content) { tocSidebar.classList.add('toc-empty'); return; }

  var headings = content.querySelectorAll('h2, h3, h4');
  /* Hide TOC entirely if the page has fewer than 2 headings. */
  if (headings.length < 2) {
    tocSidebar.classList.add('toc-empty');
    return;
  }

  var currentH2 = null;
  var currentH3 = null;
  var h2Ul = null;
  var h3Ul = null;

  headings.forEach(function(h) {
    /* Generate id if missing. */
    if (!h.id) {
      h.id = h.textContent.trim()
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fff]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.trim();
    li.appendChild(a);

    if (h.tagName === 'H2') {
      tocList.appendChild(li);
      currentH2 = li;
      h2Ul = null;
      h3Ul = null;
    } else if (h.tagName === 'H3') {
      if (!h2Ul && currentH2) {
        h2Ul = document.createElement('ul');
        currentH2.appendChild(h2Ul);
      }
      if (h2Ul) {
        h2Ul.appendChild(li);
        currentH3 = li;
        h3Ul = null;
      } else {
        tocList.appendChild(li);
        currentH3 = li;
        h3Ul = null;
      }
    } else if (h.tagName === 'H4') {
      if (!h3Ul && currentH3) {
        h3Ul = document.createElement('ul');
        currentH3.appendChild(h3Ul);
      }
      if (h3Ul) {
        h3Ul.appendChild(li);
      } else if (h2Ul) {
        h2Ul.appendChild(li);
      } else {
        tocList.appendChild(li);
      }
    }
  });

  /* Title click toggles the TOC. Behaviour depends on screen width:
     - narrow (≤1199px): toggles `.toc-open` (closed by default).
     - wide  (≥1200px): toggles `.toc-collapsed` (open by default).
     We mirror the wide-screen state onto <body> so CSS can grow the body
     width back to 100% without relying on :has(). */
  if (tocTitle) {
    tocTitle.addEventListener('click', function() {
      if (window.matchMedia('(max-width: 1199px)').matches) {
        tocSidebar.classList.toggle('toc-open');
      } else {
        var collapsed = tocSidebar.classList.toggle('toc-collapsed');
        document.body.classList.toggle('toc-collapsed-state', collapsed);
      }
    });
  }

  /* Active state tracking on scroll. */
  var tocLinks = tocList.querySelectorAll('a');
  if (tocLinks.length > 0) {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          tocLinks.forEach(function(l) { l.classList.remove('toc-active'); });
          var activeLink = tocList.querySelector('a[href="#' + entry.target.id + '"]');
          if (activeLink) { activeLink.classList.add('toc-active'); }
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px' });

    headings.forEach(function(h) { observer.observe(h); });
  }
});
</script>
