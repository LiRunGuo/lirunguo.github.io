# Sources for the daily AI digest.
#
# kind: "rss" parses with feedparser, then optionally fetches full page text
#       with trafilatura for LLM summarisation.
# kind: "arxiv" uses the arXiv Atom API to pull submissions from the last
#       N hours; the feed's own <summary> is used as the article text
#       (no separate page fetch needed).
#
# `section` groups items on the rendered digest page.
# `fallback` is a single URL or a list of URLs tried in order if the
#   primary fails; optional.

sections:
  - id: labs
    title: "🏛️ Research Labs"
  - id: papers
    title: "📜 arXiv Papers"
  - id: media
    title: "📰 Industry Media"

sources:
  # --- Labs ---------------------------------------------------------------
  - name: "OpenAI News"
    kind: rss
    section: labs
    url: "https://openai.com/news/rss.xml"
    fetch_full_text: true

  - name: "Hugging Face Blog"
    kind: rss
    section: labs
    url: "https://huggingface.co/blog/feed.xml"
    fetch_full_text: true

  - name: "Google AI Blog"
    kind: rss
    section: labs
    url: "https://blog.google/technology/ai/rss/"
    fallback: "https://blog.research.google/feeds/posts/default"
    fetch_full_text: true

  # --- arXiv (handled by the dedicated kind) ------------------------------
  - name: "arXiv cs.AI"
    kind: arxiv
    section: papers
    category: "cs.AI"
    # arXiv announces daily on weekdays but often batches weekend
    # submissions into Monday's early-UTC announcement. A wider window
    # prevents days where the API returns entries whose 'published' is
    # just outside a tight 24-hour cutoff. State-based dedup still
    # prevents repeats across runs.
    lookback_hours: 72
    max_items: 200
    fetch_full_text: false

  - name: "arXiv cs.LG"
    kind: arxiv
    section: papers
    category: "cs.LG"
    lookback_hours: 72
    max_items: 200
    fetch_full_text: false

  # --- Industry media -----------------------------------------------------
  - name: "MIT Tech Review — AI"
    kind: rss
    section: media
    url: "https://www.technologyreview.com/topic/artificial-intelligence/feed/"
    fetch_full_text: true

  - name: "MarkTechPost"
    kind: rss
    section: media
    url: "https://www.marktechpost.com/feed/"
    fetch_full_text: true

  - name: "AI News"
    kind: rss
    section: media
    url: "https://artificialintelligence-news.com/feed/"
    fetch_full_text: true
